<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Real regular polygons</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.4.1/lib/p5.js"></script>
</head>
<body>

  <p>Vertices of a n-sided regular polygon are complex zeros of z^n = 1</p>
  <p>What happens if n is a real number?</p>

  <canvas id="sketch-holder"></canvas>

  <div class="grid" width="100%">
    <div id="controls">
      <h3>Controls</h3>

      <div class="control">
        <div> n, exponent: <span id="N_label">3</span></div>
        <div><input  type="range" id="N_slider" oninput="changeN(this.value)" min="3", max="5", step="0.1", value="3"></div>
      </div>

    </div>
  </div>
  
</body>

<script type="text/javascript" src="../lib.js"></script>
<script type="text/javascript" src="main.js"></script>
<script type="text/javascript" src="classes.js"></script>

</html>
